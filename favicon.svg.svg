<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Gold Gradient for Star & Number 7 -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA500"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0F172A"/>

  <!-- Flight Path Curve -->
  <path d="M 10 46 C 22 44, 38 34, 50 18" stroke="#38BDF8" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  
  <!-- Jet Plane at the end of path -->
  <path d="M 50 18 L 41 20 L 45 25 Z" fill="#38BDF8"/>

  <!-- Stylized "7" -->
  <path d="M 16 16 H 48 L 29 48 H 20 L 36 24 H 16 Z" fill="url(#goldGrad)"/>

  <!-- Star Icon Top Right -->
  <polygon points="48,8 50,13 55,13 51,16 53,21 48,18 43,21 45,16 41,13 46,13" fill="url(#goldGrad)"/>
</svg>
